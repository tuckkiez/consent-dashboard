<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consent Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
      // Global utility functions
      function getTodayDate() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function formatDate(date) {
        const d = new Date(date);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }
    </script>
    <script type="text/babel" src="dashboard.js"></script>
    <script type="text/babel" src="table.js"></script>
    <script type="text/babel">
      const { useState } = React;

      function StatCard({ title, value, description, color }) {
        return (
          <div className={`bg-white rounded-lg shadow p-6 ${color}`}>
            <h3 className="text-lg font-semibold text-gray-800 mb-2">{title}</h3>
            <p className="text-3xl font-bold text-blue-600">{value}</p>
            {description && (
              <p className="text-sm text-gray-600 mt-2">{description}</p>
            )}
          </div>
        );
      }

      function App() {
        const [view, setView] = useState('dashboard');

        return (
          <div>
            <nav className="bg-white shadow mb-8">
              <div className="container mx-auto px-4">
                <div className="flex justify-between items-center h-16">
                  <h1 className="text-xl font-semibold">Consent Dashboard</h1>
                  <div className="space-x-4">
                    <button
                      className={`px-4 py-2 rounded ${
                        view === 'dashboard'
                          ? 'bg-blue-500 text-white'
                          : 'text-gray-600 hover:text-gray-900'
                      }`}
                      onClick={() => setView('dashboard')}
                    >
                      Dashboard
                    </button>
                    <button
                      className={`px-4 py-2 rounded ${
                        view === 'table'
                          ? 'bg-blue-500 text-white'
                          : 'text-gray-600 hover:text-gray-900'
                      }`}
                      onClick={() => setView('table')}
                    >
                      Table
                    </button>
                  </div>
                </div>
              </div>
            </nav>
            <div className="container mx-auto px-4">
              {view === 'dashboard' ? <DashboardContainer /> : <TableContainer />}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
